#import "@edition/organization/services/fragments/Organization.id.fragment.graphql"
#import "@edition/user/services/fragments/User.id.fragment.graphql"
#import "@cloud-internal/namespace/services/fragments/NamespaceLicense.fragment.graphql"
fragment Namespace on Namespace {
    __typename
    id
    updatedAt
    createdAt
    roles {
        count
    }
    members {
        count
    }
    projects {
        count
    }
    licenses (first: $firstLicense, after: $afterLicense) {
        __typename
        count
        nodes {
            ...NamespaceLicense
        }
        pageInfo {
            endCursor
            hasNextPage
        }
    }
    runtimes {
        count
    }
    parent {
        __typename
        ...on Organization {
            ...OrganizationId
        }
        ...on User {
            ...UserId
        }
    }
    userAbilities {
        createNamespaceProject
        createNamespaceRole
        createLicense
        createRuntime
        inviteMember
        __typename
    }
}