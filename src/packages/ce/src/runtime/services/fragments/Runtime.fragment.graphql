#we get the dataTypes, flowTypes and projects over the namespace id and over the respected services
fragment Runtime on Runtime {
    __typename
    id
    name
    status
    description
    namespace {
        __typename
        id
    }
    createdAt
    updatedAt
    token
    modules {
        count
        nodes {
            __typename
            id
            identifier
        }
        pageInfo {
            __typename
            endCursor
            hasNextPage
        }
    }
    projects {
        count
    }
    userAbilities {
        deleteRuntime
        rotateRuntimeToken
        updateRuntime
        __typename
    }
}