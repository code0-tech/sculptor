#import "../fragments/Function.fragment.graphql"

query Functions (
    $namespaceId: NamespaceID!
    $projectId: NamespaceProjectID!
    $firstModule: Int!
    $afterModule: String
    $firstFunction: Int!
    $afterFunction: String
    $firstParameterDefinition: Int!
    $afterParameterDefinition: String
) {
    namespace(id: $namespaceId) {
        project(id: $projectId) {
            primaryRuntime {
                modules(first: $firstModule, after: $afterModule) {
                    __typename
                    count
                    nodes {
                        functionDefinitions (first: $firstFunction, after: $afterFunction) {
                            count
                            nodes {
                                ...Function
                            }
                            pageInfo {
                                endCursor
                                hasNextPage
                            }
                        }
                    }
                    pageInfo {
                        endCursor
                        hasNextPage
                    }
                }
            }
        }
    }
}