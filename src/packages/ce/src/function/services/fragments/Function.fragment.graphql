fragment Function on FunctionDefinition {
    id
    createdAt
    updatedAt
    signature
    identifier
    displayIcon

    aliases {
        code
        content
        __typename
    }
    deprecationMessages {
        code
        content
        __typename
    }
    descriptions {
        code
        content
        __typename
    }
    documentations {
        code
        content
        __typename
    }
    displayMessages {
        code
        content
        __typename
    }
    names {
        code
        content
        __typename
    }

    parameterDefinitions (first: $firstParameterDefinition, after: $afterParameterDefinition) {
        nodes {
            id
            identifier
            updatedAt
            createdAt
            identifier
            defaultValue
            names {
                code
                content
                __typename
            }
            descriptions {
                code
                content
                __typename
            }
            documentations {
                code
                content
                __typename
            }
            __typename
        }
    }
    runtimeFunctionDefinition {
        id
        identifier
        definitionSource
        version
        runtime {
            id
        }
        __typename
    }
    __typename
}