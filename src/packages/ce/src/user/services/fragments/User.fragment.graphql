#import "@edition/user/services/identity/fragments/Identity.fragment.graphql"
#import "@edition/user/services/session/fragments/Session.fragment.graphql"
fragment User on User {
    __typename
    admin
    avatarPath
    blocked
    createdAt
    email
    emailVerifiedAt
    firstname
    readme
    id
    lastname
    namespace {
        id
    }
    namespaceMemberships (first: $firstNamespaceMembership, after: $afterNamespaceMembership) {
        count
        nodes {
            id
            namespace {
                id
            }
        }
        pageInfo {
            endCursor
            hasNextPage
        }
    }
    identities (first: $firstIdentity, after: $afterIdentity) {
        count
        nodes {
            ...Identity
        }
        pageInfo {
            endCursor
            hasNextPage
        }
    }
    sessions (first: $firstSession, after: $afterSession) {
        count
        nodes {
            ...Session
        }
        pageInfo {
            endCursor
            hasNextPage
        }
    }
    updatedAt
    username
    userAbilities {
        updateUser
        manageMfa
    }
}