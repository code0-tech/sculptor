mutation projectUpdateModuleConfiguration($namespaceProjectRuntimeAssignmentId: NamespaceProjectRuntimeAssignmentID!, $moduleConfigurations: [ModuleConfigurationInput!]!) {
    namespacesProjectsRuntimeAssignmentsUpdateModuleConfigurations(input: {
        namespaceProjectRuntimeAssignmentId: $namespaceProjectRuntimeAssignmentId,
        moduleConfigurations: $moduleConfigurations
    }) {
        errors {
            ...on Error {
                errorCode,
                details {
                    ...on ActiveModelError { attribute type }
                    __typename
                }
            }
        }
        moduleConfigurations {
            __typename
            id
            createdAt
            updatedAt
            value
            definition {
                id
                identifier
            }
        }
    }
}