#import "../fragments/Member.basic.fragment.graphql"
mutation bulkInviteMembers($userIds: [UserID!]!, $namespaceId: NamespaceID!) {
    namespacesMembersBulkInvite(input: {
        userIds: $userIds,
        namespaceId: $namespaceId
    }) {
        errors {
            ...on Error {
                errorCode,
                details {
                    __typename
                }
            }
        }
        namespaceMembers {
            ...BasicMember
        }
    }
}