fragment BasicFlow on Flow {
    __typename
    id
    createdAt
    signature
    disabledReason
    validationStatus
    name
    project {
        __typename
        id
        namespace {
            id
        }
    }
    settings {
        __typename
    }
    startingNodeId
    type {
        id
    }
    updatedAt
    userAbilities {
        deleteFlow
    }
}