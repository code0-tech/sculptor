fragment Flow on Flow {
    __typename
    id
    createdAt
    name
    signature
    nodes (first: $firstNode, after: $afterNode) {
        __typename
        nodes {
            __typename
            id
            nextNodeId
            createdAt
            updatedAt
            parameters (first: $firstNodeParameter, after: $afterNodeParameter) {
                __typename
                count
                nodes {
                    __typename
                    id
                    updatedAt
                    createdAt
                    parameterDefinition {
                        __typename
                        id
                        identifier
                        createdAt
                        updatedAt
                    }
                    value {
                        __typename
                        ... on LiteralValue {
                            __typename
                            value
                        }
                        ... on SubFlowValue {
                            __typename
                            startingNodeId
                            signature
                            functionDefinition {
                                id
                                identifier
                            }
                            settings {
                                __typename
                                identifier
                                defaultValue
                                optional
                                hidden
                            }
                        }
                        ... on ReferenceValue {
                            __typename
                            updatedAt
                            createdAt
                            nodeFunctionId
                            inputIndex
                            parameterIndex
                            referencePath {
                                __typename
                                id
                                createdAt
                                updatedAt
                                arrayIndex
                                path
                            }
                        }
                    }
                }
                pageInfo {
                    endCursor
                    hasNextPage
                }
            }
            functionDefinition {
                __typename
                id
                identifier
            }
        }
    }
    project {
        __typename
        id
        namespace {
            __typename
            id
        }
    }
    settings (first: $firstSetting, after: $afterSetting) {
        __typename
        count
        nodes {
            __typename
            id
            createdAt
            updatedAt
            flowSettingIdentifier
            value
        }
        pageInfo {
            endCursor
            hasNextPage
        }
    }
    startingNodeId
    type {
        id
    }
    executionResults {
        __typename
        count
        nodes {
            __typename
            id
            createdAt
            updatedAt
            startedAt
            finishedAt
            input
            success

            flow {
                __typename
                id
            }
            error {
                __typename
                category
                code
                dependencies
                details
                message
                timestamp
                version
            }
            nodeResults(first: $firstNodeResult, after: $afterNodeResult) {
                __typename
                count
                nodes {
                    __typename
                    id
                    createdAt
                    updatedAt
                    startedAt
                    finishedAt
                    position
                    success
                    parameterResults {
                        __typename
                        id
                        createdAt
                        updatedAt
                        value
                        position
                    }
                    functionDefinition {
                        __typename
                        id
                    }
                    nodeFunction {
                        __typename
                        id
                        functionDefinition {
                            __typename
                            id
                        }
                    }
                    error {
                        __typename
                        category
                        code
                        dependencies
                        details
                        message
                        timestamp
                        version
                    }
                }
                pageInfo {
                    __typename
                    endCursor
                    hasNextPage
                }
            }
        }
        pageInfo {
            endCursor
            hasNextPage
        }
    }
    validationStatus
    disabledReason
    updatedAt
    userAbilities {
        deleteFlow
    }
}