#import "./DataTypeRule.fragment.graphql"

fragment DataType on DataType {
    __typename
    id
    createdAt
    updatedAt

    identifier
    genericKeys
    type
    definitionSource
    version

    name {
        __typename
        code
        content
    }
    aliases {
        __typename
        code
        content
    }
    displayMessages {
        __typename
        code
        content
    }

    runtime {
        id
    }

    rules (first: $firstRule, after: $afterRule) {
        __typename
        count
        nodes {
            ...DataTypeRule
        }
        pageInfo {
            endCursor
            hasNextPage
        }
    }

}