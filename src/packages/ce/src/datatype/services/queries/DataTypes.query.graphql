#import "../fragments/DataType.fragment.graphql"

query DataTypes (
    $namespaceId: NamespaceID!
    $projectId: NamespaceProjectID!
    $firstModule: Int!
    $afterModule: String
    $firstDataType: Int!
    $afterDataType: String
    $firstRule: Int!
    $afterRule: String
) {
    namespace(id: $namespaceId) {
        project(id: $projectId) {
            primaryRuntime {
                modules(first: $firstModule, after: $afterModule) {
                    __typename
                    count
                    nodes {
                        dataTypes (first: $firstDataType, after: $afterDataType) {
                            __typename
                            count
                            nodes {
                                ...DataType
                            }
                            pageInfo {
                                endCursor
                                hasNextPage
                            }
                        }
                    }
                    pageInfo {
                        endCursor
                        hasNextPage
                    }
                }
            }
        }
    }
}