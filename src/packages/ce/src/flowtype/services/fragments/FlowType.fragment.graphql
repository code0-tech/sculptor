fragment FlowType on FlowType {
    __typename
    id
    updatedAt
    createdAt
    identifier
    names {
        code
        content
        __typename
    }
    aliases {
        code
        content
        __typename
    }
    displayMessages {
        code
        content
        __typename
    }
    descriptions {
        code
        content
        __typename
    }
    runtime {
        id
    }
    runtimeModule {
        __typename
        id
    }
    signature
    flowTypeSettings (first: $firstFlowTypeSetting, after: $afterFlowTypeSetting) {
        __typename
        count
        nodes {
            __typename
            id
            createdAt
            updatedAt
            identifier
            unique
            optional
            hidden
            defaultValue
            names {
                __typename
                code
                content
            }
            descriptions {
                __typename
                code
                content
            }
        }
        pageInfo {
            endCursor
            hasNextPage
        }
    }
    editable
    definitionSource
    displayIcon
    version
}