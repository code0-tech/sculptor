#import "../fragments/FlowType.fragment.graphql"

query FlowTypes (
    $namespaceId: NamespaceID!
    $projectId: NamespaceProjectID!
    $firstModule: Int!
    $afterModule: String
    $firstFlowType: Int!
    $afterFlowType: String
) {
    namespace(id: $namespaceId) {
        project(id: $projectId) {
            primaryRuntime {
                modules(first: $firstModule, after: $afterModule) {
                    __typename
                    count
                    nodes {
                        flowTypes (first: $firstFlowType, after: $afterFlowType) {
                            count
                            nodes {
                                ...FlowType
                            }
                            pageInfo {
                                endCursor
                                hasNextPage
                            }
                        }
                    }
                    pageInfo {
                        endCursor
                        hasNextPage
                    }
                }
            }
        }
    }
}