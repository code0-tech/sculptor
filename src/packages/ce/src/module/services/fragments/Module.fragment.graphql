#import "@edition/module/services/fragments/ModuleConfiguration.fragment.graphql"

fragment Module on RuntimeModule {
    __typename
    id
    createdAt
    updatedAt
    identifier
    version
    author
    documentation
    icon

    names {
        code
        content
        __typename
    }
    descriptions {
        code
        content
        __typename
    }
    runtime {
        id
    }
    flowTypes {
        count
    }
    functionDefinitions {
        count
    }
    configurationDefinitions (first: $firstConfiguration, after: $afterConfiguration) {
        __typename
        count
        nodes {
            ...ModuleConfiguration
        }
        pageInfo {
            endCursor
            hasNextPage
        }
    }
}